services:
  - type: web
    name: rengedo-counseling
    runtime: node
    region: singapore
    plan: free
    buildCommand: pnpm install && pnpm run build:render
    startCommand: node dist/render-server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
